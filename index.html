<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>航铂教育 · 英国 G5 入学笔试真题库</title>
<style>
:root{--bg:#f6f8fc;--card:#fff;--ink:#1d2433;--mut:#6b7488;--line:#e6eaf2;--acc:#2f6bff;--acc-soft:#eaf1ff;--shadow:0 1px 3px rgba(20,40,90,.06),0 6px 20px rgba(20,40,90,.05)}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-text-size-adjust:100%}
a{color:var(--acc);text-decoration:none}
.bar{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
.bar .in{max-width:1040px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.brand{font-size:16px;white-space:nowrap;display:inline-flex;align-items:baseline;gap:9px}
.brand b{font-weight:800;color:var(--acc)}
.brand .sb{font-weight:400;color:var(--mut);font-size:16px}
.nav{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.nav button{border:1px solid var(--line);background:var(--card);color:var(--mut);padding:7px 16px;border-radius:999px;font-size:14px;cursor:pointer;font-weight:600;transition:.15s}
.nav button.on{background:var(--acc);border-color:var(--acc);color:#fff}
.wrap{max-width:1040px;margin:0 auto;padding:18px}
.hero{padding:10px 2px 2px}
.hero .l1{font-size:25px;font-weight:800;margin:2px 0;line-height:1.25}
.hero .l1 .abbr{color:var(--acc);margin-right:8px}
.hero .l2{font-size:14px;color:#454e60;font-weight:600;margin-top:2px}
.hero .l3{font-size:13px;color:var(--mut);margin-top:4px}
.subtabs{display:flex;gap:6px;margin:16px 0 6px;border-bottom:1px solid var(--line);overflow-x:auto}
.subtabs button{border:0;background:none;color:var(--mut);padding:10px 4px;margin-right:14px;font-size:15px;cursor:pointer;font-weight:600;border-bottom:2px solid transparent;white-space:nowrap}
.subtabs button.on{color:var(--acc);border-bottom-color:var(--acc)}
section.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:18px;margin:14px 0}
section.card h3{margin:0 0 12px;font-size:17px;display:flex;align-items:center;gap:8px}
section.card h3::before{content:"";width:4px;height:16px;background:var(--acc);border-radius:3px}
.lead{color:var(--mut);font-size:13px;margin:-4px 0 14px}
table{width:100%;border-collapse:collapse;font-size:14px;overflow:hidden;border-radius:10px}
th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:top}
th{background:var(--acc-soft);color:#2a4a8f;font-weight:700;white-space:nowrap}
tr:last-child td{border-bottom:0}
.kv td:first-child{white-space:nowrap;color:var(--mut);font-weight:600;width:36%}
p.para{margin:0 0 10px;white-space:pre-wrap}
.faq-item{border:1px solid var(--line);border-radius:10px;margin:8px 0;overflow:hidden;background:var(--card)}
.faq-q{cursor:pointer;padding:11px 14px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;user-select:none;transition:background .2s}
.faq-q .qi{color:var(--acc);font-weight:800}
.faq-q .chev{margin-left:auto;color:var(--mut);transition:transform .28s ease;font-size:12px}
.faq-item.open .faq-q{background:var(--acc-soft)}
.faq-item.open .faq-q .chev{transform:rotate(180deg)}
.faq-panel{display:grid;grid-template-rows:0fr;transition:grid-template-rows .28s ease}
.faq-item.open .faq-panel{grid-template-rows:1fr}
.faq-ans-in{overflow:hidden}
.faq-ans{padding:0 14px;color:#39414f;font-size:14px;white-space:pre-wrap;line-height:1.75;transition:padding .28s ease}
.faq-item.open .faq-ans{padding-top:13px;padding-bottom:14px}
/* 航铂课程 */
.plan{margin:16px 0}
.plan .ph{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.plan .pn{font-size:16px;font-weight:700}
.plan .pl{font-size:13px;font-weight:700;color:var(--acc);background:var(--acc-soft);padding:2px 10px;border-radius:7px}
.plan .pf{font-size:12.5px;color:var(--mut)}
.course-intro{color:#454e60;font-size:14px;margin:0 0 4px}
.cta{margin-top:6px;color:var(--mut);font-size:13px}
.tnum{white-space:nowrap;color:var(--mut);width:14%}
.thr{white-space:nowrap;width:14%}
.grp{margin:14px 0}
.grp .gh{font-size:15px;font-weight:700;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.grp .gh .y{color:var(--acc)}
.files{display:grid;gap:8px}
.f{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--card);border:1px solid var(--line);border-radius:11px;transition:.12s}
.f:hover{border-color:var(--acc);box-shadow:var(--shadow)}
.f:active{transform:scale(.997)}
.pill{font-size:12px;font-weight:700;padding:3px 10px;border-radius:7px;white-space:nowrap}
.p-试卷{background:#e7f0ff;color:#2f6bff}
.p-答案{background:#e6f7ee;color:#16a163}
.p-报告{background:#fdeede;color:#c9821a}
.f .nm{flex:1;font-size:14px;color:var(--ink)}
.f .sz{color:var(--mut);font-size:12px;white-space:nowrap}
.res{display:grid;grid-template-columns:1fr;gap:8px}
.muted{color:var(--mut);font-size:13px}
.pnote{background:#fff8ec;border:1px solid #f2e2c2;color:#7a5a1e;font-size:13px;line-height:1.7;padding:10px 13px;border-radius:10px;margin-bottom:14px}
.pintro{margin:0;padding-left:20px}
.pintro li{font-size:13.5px;color:#39414f;line-height:1.75;margin:6px 0}
.pintro li::marker{color:var(--acc)}
footer{border-top:1px solid var(--line);background:var(--card);padding:28px 18px;margin-top:22px}
.foot{max-width:1040px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:22px;flex-wrap:wrap}
.foot .qr{width:158px;border-radius:12px;box-shadow:var(--shadow);display:block}
.foot-txt{text-align:left;max-width:340px}
.foot-h{font-size:17px;font-weight:800;color:var(--ink)}
.foot-p{font-size:13.5px;color:#454e60;margin-top:7px;line-height:1.7}
.foot-sub{font-size:12px;color:var(--mut);margin-top:16px}
@media(max-width:540px){.foot{flex-direction:column;gap:14px}.foot-txt{text-align:center}}
@media(min-width:680px){.res{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.brand .sb{display:none}.hero .l1{font-size:22px}.nav button{padding:6px 12px;font-size:13px}}
</style>
</head>

<div class="bar"><div class="in">

</div></div>

    <div class="foot-sub">航铂教育　·　共 <span id="tot"></span> 份资料　·　仅供个人备考学习使用</div>

</div></footer>

"name": "STEP - Front Cover (sample)", "path": "STEP/References/STEP - Front Cover (sample).pdf", "size": 367091, "kind": "资料"}, {"cat": "References", "name": "STEP Answer Book - Front Cover (sample)", "path": "STEP/References/STEP Answer Book - Front Cover (sample).pdf", "size": 395961, "kind": "资料"}, {"cat": "References", "name": "STEP Answer Book - Sample Page (sample)", "path": "STEP/References/STEP Answer Book - Sample Page (sample).pdf", "size": 223314, "kind": "资料"}, {"cat": "References", "name": "STEP Formulae booklet", "path": "STEP/References/STEP Formulae booklet.pdf", "size": 140310, "kind": "资料"}], "TMUA": [{"cat": "Specifications", "name": "TMUA Content Specification", "path": "TMUA/Specifications/TMUA Content Specification.pdf", "size": 3389778, "kind": "考纲"}, {"cat": "References", "name": "Notes on Logic and Proof (June 2025)", "path": "TMUA/References/Notes on Logic and Proof (June 2025).pdf", "size": 1518322, "kind": "资料"}, {"cat": "References", "name": "Notes on Mathematics for TMUA and ESAT (M2, June 2025)", "path": "TMUA/References/Notes on Mathematics for TMUA and ESAT (M2, June 2025).pdf", "size": 2088196, "kind": "资料"}], "ESAT": [{"cat": "Specifications", "name": "ESAT Content Specification", "path": "ESAT/Specifications/ESAT Content Specification.pdf", "size": 2163955, "kind": "考纲"}, {"cat": "References", "name": "ESAT Guide - Biology (June 2025)", "path": "ESAT/References/ESAT Guide - Biology (June 2025).pdf", "size": 7320366, "kind": "资料"}, {"cat": "References", "name": "ESAT Guide - Chemistry (June 2025)", "path": "ESAT/References/ESAT Guide - Chemistry (June 2025).pdf", "size": 13876717, "kind": "资料"}, {"cat": "References", "name": "ESAT Guide - Mathematics 1 (June 2025)", "path": "ESAT/References/ESAT Guide - Mathematics 1 (June 2025).pdf", "size": 10272218, "kind": "资料"}, {"cat": "References", "name": "ESAT Guide - Physics (June 2025)", "path": "ESAT/References/ESAT Guide - Physics (June 2025).pdf", "size": 5889749, "kind": "资料"}, {"cat": "References", "name": "Notes on Mathematics for TMUA and ESAT (M2, June 2025)", "path": "ESAT/References/Notes on Mathematics for TMUA and ESAT (M2, June 2025).pdf", "size": 2088196, "kind": "资料"}], "TARA": [{"cat": "Specifications", "name": "TARA Content Specification", "path": "TARA/Specifications/TARA Content Specification.pdf", "size": 553012, "kind": "考纲"}, {"cat": "References", "name": "TARA Question Guide", "path": "TARA/References/TARA Question Guide.pdf", "size": 290801, "kind": "资料"}]}, "DESC": {"STEP": {"key": "STEP", "name_zh": "数学高阶考试", "name_en": "Sixth Term Examination Paper", "tagline": "剑桥等顶尖数学专业使用的高难度入学数学考试", "summary": [["主办方", "OCR（隶属剑桥大学，2024 年起接替 CAAT 负责命题与组织）"], ["适用学校/课程", "剑桥大学（数学等）、华威大学等院校的数学及相关专业"], ["考试时间", "每年 6 月（在 A-level 考试期末段进行）"], ["考试形式", "纸笔作答的主观证明/解答题，不分选择题"], ["总时长/卷数", "2 张试卷（STEP 2、STEP 3），每卷 3 小时"], ["难度", "显著高于 A-level，被视为最难的中学后数学入学考试之一"]], "background": "STEP（Sixth Term Examination Paper，数学）是面向英国及国际数学专业申请者的高阶数学入学考试，旨在考查考生在 A-level 之外更深层次的数学理解、推理与综合解题能力。考试用较长篇幅的开放式证明与解答题，要求考生从陌生情境出发独立构建完整论证，因此能有效区分顶尖数学申请者，并帮助学生为大学严谨的数学学习做好准备。\n\nSTEP 原设 STEP 1、STEP 2、STEP 3 三张试卷，其中 STEP 1 已于 2020 年停考，目前仅保留 STEP 2 与 STEP 3。考试此前由剑桥评估招生测试部门（CAAT）组织，自 2024 年起改由 OCR（同属剑桥大学集团）负责命题与运营，考试内容与定位保持稳定。", "dates": {"text": "以 2026 年（对应 2026 年秋季入学申请周期）为准：报名于 3 月开放、5 月初截止，考试在 6 月分两天进行，成绩在 8 月中旬随 A-level 放榜前后公布。逾期报名一律不予受理。", "table": {"headers": ["阶段", "时间"], "rows": [["报名开放", "2026 年 3 月 1 日"], ["报名截止", "2026 年 5 月 4 日（不接受逾期报名）"], ["STEP 2 考试", "2026 年 6 月 4 日（英国时间 9:00）"], ["STEP 3 考试", "2026 年 6 月 10 日（英国时间 9:00）"], ["成绩公布", "2026 年 8 月 12 日发至考点、8 月 13 日发至考生（复核申请截止 8 月 20 日）"]]}}, "content": {"text": "STEP 现有 STEP 2 与 STEP 3 两张试卷。STEP 2 基于 A-level 数学与 AS 阶段进阶数学（含少量补充），STEP 3 基于 A-level 数学与完整 A-level 进阶数学（含少量补充），STEP 3 难度更高。每张卷各含 12 道题：8 道纯数学、2 道力学、2 道概率统计，每题满分 20 分。考生可任选作答，但建议作答不超过 6 题，最终成绩按得分最高的 6 题计算，单卷满分 120 分。每卷限时 3 小时，全程不得使用计算器。", "table": {"headers": ["试卷", "内容范围", "题量/作答", "时长"], "rows": [["STEP 2", "以 A-level 数学 + AS 进阶数学为基础（含补充与拓展）", "12 题（8 纯数学/2 力学/2 概率统计），建议作答不超过 6 题，取最高 6 题计分，满分 120", "3 小时（禁用计算器）"], ["STEP 3", "以 A-level 数学 + 完整 A-level 进阶数学为基础（难度更高）", "12 题（8 纯数学/2 力学/2 概率统计），建议作答不超过 6 题，取最高 6 题计分，满分 120", "3 小时（禁用计算器）"]]}}, "schools": {"text": "STEP 主要服务于剑桥大学的数学及相关专业录取，通常作为有条件 offer 的一部分；华威大学等院校也将其作为可选或备选的入学要求；此外许多大学的数学专业推荐申请者用 STEP 历年真题进行练习。具体要求以各校当年 offer 为准。", "table": {"headers": ["大学", "专业/学院", "要求情况"], "rows": [["剑桥大学", "数学及部分相关专业（各学院）", "通常要求同时参加 STEP 2 与 STEP 3，并作为有条件 offer 的一部分"], ["华威大学", "数学相关专业", "未参加 TMUA 的申请者通常被要求任一张 STEP 达到 grade 2"], ["其他院校（如帝国理工、巴斯、布里斯托等）", "数学相关专业", "多为推荐用真题练习，或在个别情况下作为可选/备选条件，以各校要求为准"]]}}, "difficulty": "STEP 难度显著高于 A-level：A-level 通常要求两小时内作答 11–14 道题，而 STEP 要求三小时内深入完成最多 6 道证明/解答题，强调独立推理与完整论证。题目通过率偏低，达标线（按原始分换算等级）相对不高——例如 2021 年 STEP 2 中超过五分之三的考生得分低于 45%，约 54/120（45%）即可达到 grade 2 及以上。成绩按 S、1、2、3、U 五档评定（S 最高，U 为不及格），各档分数线每年依试卷难度调整。", "scoring": {"text": "每卷取最高 6 题、满分 120 分的原始分，经当年评级换算为 S/1/2/3/U 五个等级；剑桥等院校的有条件 offer 直接以等级为条件（如 STEP 2、STEP 3 各达 grade 1）。常见剑桥数学 offer 为 A*A*A 加 STEP 2、STEP 3 各 grade 1；部分学院可灵活为 A*A*A* 加单张 STEP grade 1。各等级对应的原始分数线每年随试卷难度浮动。", "table": {"headers": ["等级", "说明"], "rows": [["S", "Outstanding，最高等级，表现极为优异"], ["1", "Very Good，剑桥数学 offer 常见的最低要求"], ["2", "Good，华威等院校常见的最低要求"], ["3", "Satisfactory，及格的最低等级"], ["U", "Unclassified，未达及格标准"]]}}, "faq": [{"q": "STEP 由谁主办？2024 年有什么变化？", "a": "自 2024 年起由 OCR（隶属剑桥大学）负责命题与组织，接替此前的剑桥评估招生测试部门（CAAT），考试内容与定位保持不变。"}, {"q": "现在还有 STEP 1 吗？", "a": "没有。STEP 1 已于 2020 年停考，目前仅保留 STEP 2 与 STEP 3 两张试卷。"}, {"q": "考试时间和形式是怎样的？", "a": "每张卷限时 3 小时，含 12 道题（8 纯数学、2 力学、2 概率统计），全部为开放式证明/解答题，没有选择题。"}, {"q": "要答多少题？怎么计分？", "a": "可任选作答，但建议不超过 6 题；最终成绩按得分最高的 6 题计算，每题 20 分，单卷满分 120 分。"}, {"q": "考试能用计算器吗？", "a": "不能，STEP 全程禁止使用计算器。"}, {"q": "成绩等级是怎么划分的？", "a": "分为 S、1、2、3、U 五档，S 最高、U 为不及格；各档对应的原始分数线每年随试卷难度调整。"}, {"q": "剑桥数学的典型 offer 是什么？", "a": "常见为 A*A*A（数学、进阶数学加一门）加 STEP 2 与 STEP 3 各 grade 1；部分学院也可为 A*A*A* 加单张 STEP grade 1，以学院 offer 为准。"}, {"q": "2026 年报名和考试的关键时间是什么？", "a": "报名 2026 年 3 月 1 日开放、5 月 4 日截止；STEP 2 于 6 月 4 日、STEP 3 于 6 月 10 日开考；成绩约于 8 月 13 日公布。"}]}, "TMUA": {"key": "TMUA", "name_zh": "数学大学入学考试", "name_en": "Test of Mathematics for University Admission", "tagline": "英国顶尖数学相关专业的入学数学能力测试", "summary": [["主办方", "UAT-UK / Pearson VUE"], ["适用学校/课程", "剑桥、帝国理工、华威、杜伦、LSE、UCL 等校的数学、计算机、经济等专业"], ["考试时间", "每年 10 月与次年 1 月两个考期（如 2026 入学对应 2025 年 10 月、2026 年 1 月）"], ["考试形式", "机考（Pearson VUE 考点）"], ["总时长", "2 小时 30 分钟（两卷各 75 分钟）"], ["难度", "高于 A-level，侧重数学推理与逻辑，平均分约 4–5（满分 9）"]], "background": "TMUA（数学大学入学考试）旨在考查申请者将数学知识灵活运用于新情境的能力以及数学推理与逻辑思维水平，为大学选拔数学、计算机科学、经济等需要较强数学基础的专业申请者提供 A-level 成绩之外的额外参考依据。考试不考超出 A-level（AS 水平为主）的知识点，但题目对思维深度、推理严谨性和解题策略要求更高，更接近大学数学的思考方式。\n\n自 2024 年起，TMUA 改由 UAT-UK 主办，并通过 Pearson VUE 全球专业考点以机考（计算机化）形式交付，取代了此前由剑桥评估（Cambridge Assessment）组织的纸笔考试。考试每年提供 10 月与次年 1 月两个考期，多数剑桥、牛津相关专业申请者需在 10 月考期参加。", "dates": {"text": "TMUA 每年设两个考期：第一考期在 10 月（剑桥/牛津申请者通常须参加此考期），第二考期在次年 1 月（帝国理工、杜伦、LSE、UCL、华威等多在此考期）。报名需在考前数周通过 UAT-UK / Pearson VUE 完成。以 2026 年入学（2025 年考试季）为例的大致时间线如下，具体日期以官方公布为准。", "table": {"headers": ["阶段", "时间"], "rows": [["报名（10 月考期）", "2025 年 7 月底开放，约 9 月底截止"], ["考试（第一考期）", "2025 年 10 月中旬（约 10 月 15–16 日）"], ["报名（1 月考期）", "2025 年 10 月底开放，约 12 月中旬截止"], ["考试（第二考期）", "2026 年 1 月上旬（约 1 月 8–9 日）"], ["成绩公布", "10 月考期约 11 月中旬出分；1 月考期约 2 月初出分（考后约四周）"]]}}, "content": {"text": "TMUA 由两份试卷组成，均为机考、全部选择题、不可使用计算器或词典；考试不倒扣分，鼓励作答所有题目。两卷内容互补：Paper 1 侧重将数学知识应用于新情境的解题能力，Paper 2 侧重数学推理与初等逻辑（如命题、必要/充分条件、论证识别等）。考查范围以 A-level（尤其 AS 阶段）纯数学为主，不含统计与力学。", "table": {"headers": ["试卷", "内容", "题量", "时长"], "rows": [["Paper 1（数学应用）", "考查在新情境中应用数学知识解决问题的能力", "20 题", "75 分钟"], ["Paper 2（数学推理）", "考查数学推理能力及初等逻辑（命题、充要条件、论证分析等）", "20 题", "75 分钟"]]}}, "schools": {"text": "TMUA 被英国多所顶尖大学用于数学及相关专业的选拔，部分专业为强制要求，部分为推荐或作为有利证据；高分者在部分院校可获得降分录取。各专业要求每年可能调整，报名前应以目标院校具体课程页面为准。", "table": {"headers": ["大学", "专业", "要求情况"], "rows": [["剑桥大学", "数学、计算机科学、经济", "必考（多数申请者须在 10 月考期参加）"], ["帝国理工学院", "数学等相关专业", "必考/重要参考"], ["华威大学", "计算机科学（必考）；数学、统计、经济、数据科学等可选", "必考或推荐，高分（约 6.5+）可获降分录取"], ["杜伦大学", "数学等", "作为有利的可选证据，高分有助于录取/降分"], ["伦敦政治经济学院（LSE）", "数学、数学与经济等", "要求或强烈推荐"], ["巴斯 / 兰卡斯特 / UCL 等", "数学及相关专业", "推荐或作为有利证据；兰卡斯特对较低分（约 4.5+）亦给予一定优惠"]]}}, "difficulty": "TMUA 采用 1.0–9.0 分制（保留一位小数），无及格线。整体难度高于 A-level：知识点不超纲，但强调推理严谨性、逻辑思辨和解题策略，且无计算器、时间紧。历年平均分大致在 4–5 之间，多数考生集中在 2.5–5.5，最常见分数约为 3.5；5.5–6.0 以上即较具竞争力。各校门槛不一：华威、杜伦等通常视 6.5 及以上为很强的成绩（可对应降分），兰卡斯特对约 4.5 以上即给予一定优惠。相较 A-level 偏重熟练计算与套用方法，TMUA 更考查对数学本质的理解与逻辑论证能力，接近大学数学的思维方式。", "scoring": {"text": "TMUA 两份试卷各含 20 道选择题、每题 1 分，不倒扣分。每年分别为两卷及总分提供换算表，将原始分（满分 40）换算为 1.0–9.0 的标准分。考生最终得到一个总体成绩（约为两卷成绩的综合/平均），同时各卷也有单独分数。成绩没有及格/不及格之分，大学结合 A-level 成绩及申请的其他部分综合考量使用。", "table": {"headers": ["项目", "说明"], "rows": [["计分范围", "1.0–9.0（保留一位小数）"], ["原始分", "两卷各 20 题、每题 1 分，共 40 分，不倒扣"], ["合成方式", "按官方换算表将两卷原始分综合换算为单一总体分数（约为两卷的平均水平），并报告各卷分数"], ["如何使用", "作为 A-level 之外的额外选拔/区分依据；部分院校设门槛或对高分给予降分录取"]]}}, "faq": [{"q": "TMUA 现在是机考还是纸笔考试？", "a": "自 2024 年起，TMUA 由 UAT-UK 主办，并通过 Pearson VUE 考点以机考（计算机化）形式进行，已不再是纸笔考试。"}, {"q": "考试可以用计算器吗？", "a": "不可以。TMUA 全程不允许使用计算器，也不允许使用词典。"}, {"q": "考试有几份卷子、多长时间？", "a": "共两份卷子（Paper 1 数学应用、Paper 2 数学推理），各 20 道选择题、各 75 分钟，总时长 2 小时 30 分钟。"}, {"q": "答错会倒扣分吗？", "a": "不会。TMUA 不对错误答案扣分，因此建议尽量作答每一道题。"}, {"q": "TMUA 怎么计分？有没有及格线？", "a": "两卷各按原始分换算为 1.0–9.0 的标准分，并给出一个综合总体分数。考试没有及格线，由大学结合其他申请材料综合评估。"}, {"q": "什么时候考、什么时候报名？", "a": "每年设 10 月和次年 1 月两个考期，报名在考前数周通过 UAT-UK / Pearson VUE 完成。剑桥、牛津相关专业申请者通常须参加 10 月考期；报名名额有限，需尽早预约。"}, {"q": "哪些大学需要 TMUA？", "a": "剑桥、帝国理工、华威、杜伦、LSE、UCL 等校的数学、计算机、经济等专业要求或推荐 TMUA。具体要求逐年可能变动，应以目标院校课程页面为准。"}, {"q": "考多少分算好？", "a": "无固定标准，但历年平均分约 4–5；5.5–6.0 以上较有竞争力，6.5 及以上被华威、杜伦等视为很强成绩并可能对应降分录取。"}]}, "ESAT": {"key": "ESAT", "name_zh": "工程与科学入学考试", "name_en": "Engineering and Science Admissions Test", "tagline": "剑桥、帝国理工工程与理科申请的机考入学测试", "summary": [["主办方", "UAT-UK / Pearson VUE"], ["适用学校/课程", "剑桥、帝国理工 等的工程/自然科学/兽医类"], ["考试时间", "通常每年 10 月一个主考窗口（部分人群另有次年 1 月窗口）"], ["考试形式", "机考（Pearson VUE 考点上机作答）"], ["总时长", "多数考生约 120 分钟（3 个模块，每模块 40 分钟）"], ["难度", "较高；基于 A-Level/高中数理知识，强调应用与速度，无倒扣分"]], "background": "ESAT（工程与科学入学考试）由 University Admissions Tests UK（UAT-UK）主办、由 Pearson VUE 承办运营，为全程上机作答的入学测试。它于 2024 年首次启用（面向 2025 年入学申请），取代了原先的 NSAA（自然科学入学测试）与 ENGAA（工程入学测试），将旧的两科分卷模式整合为统一的多模块机考体系。ESAT 主要服务于剑桥大学与帝国理工学院的工程、自然科学、兽医等竞争激烈的理工科课程（部分年份亦被 UCL 等少数院校参考使用）。\n\n考试目的在于在统一标准下评估申请者运用数学与科学知识的能力，从而帮助高度选拔性的本科课程在大量优秀申请者中进行区分。题目均基于考生在中学阶段已学过的数理内容，重点考查知识的应用、推理与解题速度，而非超纲内容；各模块均为多项选择题，按模块分别计分并自动发送给所申请院校。", "dates": {"text": "ESAT 通常每年设主考窗口（10 月，面向当年申请、次年入学）；部分院校允许成熟/特定申请者使用次年 1 月窗口。报名自年中（约 6 月/7 月）开放，考前数周截止，成绩一般在考试结束后约四周公布并自动报送院校。以下为最新一轮（2026 年 10 月考试、2027 年入学）的官方时间，供参考；具体年份请以 UAT-UK 与各校官网为准。", "table": {"headers": ["阶段", "时间"], "rows": [["报名开放", "约 2026 年 6 月起（剑桥相关考点预约约 7 月 20 日起）"], ["报名截止", "约 2026 年 9 月 28 日（主考窗口）"], ["主考窗口", "2026 年 10 月 12–16 日"], ["次考窗口（仅限特定/成熟申请者）", "2027 年 1 月 4–8 日（截止约 2026 年 12 月 21 日）"], ["成绩公布", "考试结束后约 4 周，并自动报送所申请院校"]]}}, "content": {"text": "ESAT 共设 5 个模块：Mathematics 1 为所有考生必考，其余按所报专业要求从 Mathematics 2、Physics、Chemistry、Biology 中选考。多数考生共考 3 个模块（Mathematics 1 + 两个选考），全程约 120 分钟。每个模块独立计时、独立计分，均为多项选择题，每模块 27 题、限时 40 分钟。题目基于中学数理知识，强调应用与推理；答错不倒扣分。", "table": {"headers": ["模块", "内容", "题量", "时长"], "rows": [["Mathematics 1（必考）", "核心数学：代数、几何、概率统计、微积分等基础应用，所有考生必考", "27 题", "40 分钟"], ["Mathematics 2", "进阶数学：更高阶代数、微积分与数学方法，多用于工程类课程", "27 题", "40 分钟"], ["Physics", "物理：力学、电学、波、能量等中学物理核心内容的应用", "27 题", "40 分钟"], ["Chemistry", "化学：物理化学、无机与有机化学等中学化学核心内容的应用", "27 题", "40 分钟"], ["Biology", "生物：细胞、生理、遗传、生态等中学生物核心内容的应用", "27 题", "40 分钟"]]}}, "schools": {"text": "目前主要由剑桥大学与帝国理工学院在工程及理科课程中要求 ESAT，各课程要求的模块组合不同。所有课程都必考 Mathematics 1。具体以各校该年度官网为准。", "table": {"headers": ["大学", "专业/课程", "需考模块"], "rows": [["剑桥大学", "工程（Engineering）", "Mathematics 1 + Physics + Mathematics 2"], ["剑桥大学", "自然科学（Natural Sciences）", "Mathematics 1 + 从 Math 2/Physics/Chemistry/Biology 任选两科"], ["剑桥大学", "化学工程与生物技术", "Mathematics 1 + 任选两科"], ["剑桥大学", "兽医（Veterinary Medicine）", "Mathematics 1 + 任选两科"], ["帝国理工", "航空/土木/电子电气/机械工程、物理", "Mathematics 1 + Mathematics 2 + Physics"], ["帝国理工", "化学工程", "Mathematics 1 + Mathematics 2 + Chemistry"], ["帝国理工", "戴森设计工程学院", "Mathematics 1 + Mathematics 2"], ["帝国理工", "生命科学（Life Sciences）", "Mathematics 1 + Chemistry + Biology"]]}}, "difficulty": "ESAT 整体难度较高，定位与旧的 NSAA/ENGAA 相当，但形式上由纸笔分卷改为统一上机的多模块结构。题目不超纲（基于中学数理），但在有限时间内（每模块 27 题 40 分钟，平均不到 90 秒一题）强调对知识的灵活应用、推理与速度，因此区分度主要来自准确率与时间管理。答错不倒扣分，鼓励全部作答。各模块按 1.0–9.0 标度分别报分，便于院校在大量高分申请者中进行细分比较。", "scoring": {"text": "每个模块独立计分：每答对 1 题计 1 分，答错或不答不倒扣；原始分经换算后以 1.0（低）至 9.0（高）的标度、精确到一位小数分别报告。ESAT 不设及格线，无整体合格/不合格之分。成绩在公布后自动报送所申请院校，作为整体录取评估的一部分（与学术成绩、个人陈述、面试等综合考量），不作为唯一决定因素。", "table": {"headers": ["项目", "说明"], "rows": [["计分", "每模块每答对 1 题得 1 分，答错不倒扣；换算为 1.0–9.0 标度（精确到 0.1），各模块分别报分"], ["及格线", "无及格/不及格之分，无统一总分"], ["如何使用", "成绩自动发送至所申请院校，作为录取综合评估的一部分，与成绩、PS、面试等共同考量"]]}}, "faq": [{"q": "ESAT 和旧的 NSAA/ENGAA 有什么区别？", "a": "ESAT 于 2024 年（面向 2025 年入学）取代了原 NSAA（自然科学）与 ENGAA（工程）两项测试。最大变化是：由纸笔考试改为在 Pearson VUE 考点的全程上机机考；由两科分卷改为 5 个模块（Math 1 必考，另从 Math 2/Physics/Chemistry/Biology 中按专业选考），多数考生考 3 个模块；并改由 UAT-UK 统一主办。"}, {"q": "我需要考哪些模块？", "a": "所有考生都必须考 Mathematics 1，其余模块由所报课程决定。例如剑桥工程为 Math 1 + Physics + Math 2；剑桥自然科学/化工生物技术/兽医为 Math 1 + 自选两科；帝国理工多数工程课程为 Math 1 + Math 2 + Physics。务必以目标课程当年度的官方要求为准。"}, {"q": "考试可以用计算器吗？", "a": "不可以。ESAT 全程不允许使用计算器，也不允许使用词典；相关数学计算需手算完成。"}, {"q": "ESAT 是机考还是纸笔考试？", "a": "ESAT 是全程上机的机考，在 Pearson VUE 授权考点完成，全部为多项选择题，每个模块独立计时。"}, {"q": "答错会倒扣分吗？", "a": "不会。每答对 1 题得 1 分，答错或不答均不扣分，因此建议把所有题目都作答完（包括不确定的题也应猜答）。"}, {"q": "ESAT 怎么报分？有及格线吗？", "a": "每个模块分别以 1.0（低）到 9.0（高）的标度报分，精确到一位小数。ESAT 没有及格线，也没有统一总分，成绩作为院校整体录取评估的一部分。"}, {"q": "一个申请季要考几次 ESAT？", "a": "每个申请季只需参加一次。通常有 10 月主考窗口，部分院校允许成熟/特定申请者使用次年 1 月的次考窗口；需在 UAT-UK 网站注册并在预约窗口内预订考位。"}, {"q": "ESAT 大概多少钱、什么时候出成绩？", "a": "考试费约为英国/爱尔兰考生 78 英镑、国际考生 133 英镑（以官网当年公布为准）。成绩一般在考试结束后约 4 周公布，并自动报送所申请院校。"}]}, "TARA": {"key": "TARA", "name_zh": "学术推理入学考试", "name_en": "Test of Academic Reasoning for Admissions", "tagline": "牛津与 UCL 部分专业新启用的通用学术推理机考", "summary": [["主办方", "UAT-UK / Pearson VUE"], ["适用学校/课程", "UCL、牛津 部分课程（非学科专属测试）"], ["考试时间", "每年两次：10 月（约 10 月 14 日）与次年 1 月（约 1 月 7 日）；牛津申请者须在 10 月场"], ["考试形式", "机考（Pearson VUE 考点上机作答）"], ["总时长", "约 120 分钟（不含休息），分三个 40 分钟模块"], ["难度", "通用学术推理类，与已停考的 TSA、BMAT 风格相近，不考查具体学科知识"]], "background": "TARA（Test of Academic Reasoning for Admissions，学术推理入学考试）是由 UAT-UK（牛津、剑桥、帝国理工等合作成立的入学测试机构）委托 Pearson VUE 承办的全新机考，于 2025-26 申请周期（2026 年入学起）首次启用。它是一项非学科专属（non-subject specific）测试，考查批判性思维、问题解决与书面表达等通用学术能力，而非特定学科知识。\n\nTARA 在很大程度上承接并取代了此前已停考的 TSA（思维能力评估）与 BMAT（生物医学入学考试）：客观题模块的命题传统与 TSA Section 1、BMAT Section 1 一脉相承，写作模块亦类似 TSA 的写作部分。在牛津，TARA 取代了用于经济管理、PPE、人文科学、心理学等专业的 TSA；在 UCL，TARA 取代了原计算机科学专业使用的 STAT。考试在 Pearson VUE 考点上机进行，由 UAT-UK 统一组织报名、命题与出分。", "dates": {"text": "以 2026-27 周期（2026 年 10 月入学考试季）为准的官方时间线。牛津申请者必须参加 10 月场；仅申请 UCL（未同时申请牛津）者可自选 10 月或 1 月场。中国大陆、香港、澳门每个考试窗口仅提供一天考试。具体以官方公布为准。", "table": {"headers": ["阶段", "时间"], "rows": [["账户创建开放", "2026 年 6 月 1 日"], ["报名/预订考位（10 月场）", "2026 年 7 月 20 日开放，9 月 28 日截止"], ["考试（10 月场）", "2026 年 10 月 12–16 日（通常 10 月 14 日）"], ["成绩公布（10 月场）", "2026 年 11 月 16 日"], ["报名/预订考位（1 月场）", "2026 年 10 月 26 日开放，12 月 21 日截止"], ["考试（1 月场）", "2027 年 1 月 4–8 日（通常 1 月 7 日）"], ["成绩公布（1 月场）", "2027 年 2 月 8 日"]]}}, "content": {"text": "TARA 由三个必考模块组成，全部为系统预选、不可更改，每个模块独立计时 40 分钟，总计约 120 分钟（不含休息）：批判性思维（Critical Thinking）、问题解决（Problem Solving）均为 22 道选择题；写作任务（Writing Task）需从 3 个题目中选 1 个作答，字数上限 750 词。", "table": {"headers": ["模块", "内容", "题量/形式", "时长"], "rows": [["批判性思维（Critical Thinking）", "评估对论证的理解、分析与评价能力，如识别假设、推断、找出谬误等", "22 道选择题", "40 分钟"], ["问题解决（Problem Solving）", "评估运用数值与逻辑信息解决新问题的能力（基础数学/数据推理）", "22 道选择题", "40 分钟"], ["写作任务（Writing Task）", "从 3 个议论文式题目中选 1 个，进行有条理的书面论证", "3 选 1，上限 750 词", "40 分钟"]]}}, "schools": {"text": "目前 TARA 由 UCL 与牛津大学在多个专业中要求。UCL 用于计算机科学相关本科课程（取代原 STAT）；牛津用于一批人文社科类课程（取代原 TSA）。注意并非所有相关专业都使用 TARA（如 UCL 经济学改用 TMUA），应以各校招生页面为准。", "table": {"headers": ["大学", "专业/课程", "要求情况"], "rows": [["UCL", "计算机科学相关：Computer Science BSc/MEng、Computer Science and Mathematics MEng、Robotics and AI MEng", "必考；取代原 STAT。可选 10 月或 1 月场（除非同时申请牛津）"], ["牛津大学", "经济管理、历史与经济、历史与政治、人文科学、PPE、实验心理学、PPL 等", "必考；取代原 TSA。必须参加 10 月场"]]}}, "difficulty": "TARA 属于通用学术推理类测试，不依赖特定学科知识，重在考查批判性思维、逻辑与数值问题解决以及书面论证能力，强调在时间压力下快速准确地推理（每模块 22 题/40 分钟）。其风格与已停考的 TSA、BMAT 高度相似。由于是全新考试、暂无历年真题，官方在备考材料页面建议：先研读 TARA 考试大纲（specification）与题型指南，完成 Pearson VUE 提供的与实战格式/软件一致的练习测试；如需更多练习，可使用 TSA Section 1（2008-2023）与 BMAT Section 1（2003-2023）的历年试题（附答案）进行针对性训练。", "scoring": {"text": "批判性思维与问题解决两个客观模块分别给分，采用 1（低）至 9（高）的量表，结果精确到一位小数；写作任务不由 UAT-UK 评分，而是将考生答卷副本直接发送给所申请的相关大学，由各校在录取评审中自行参考。各校如何使用分数及是否设阈值由学校决定。", "table": {"headers": ["项目", "说明"], "rows": [["客观模块", "批判性思维、问题解决各自独立给分，量表 1–9（精确到 0.1）"], ["写作任务", "UAT-UK 不评分；答卷副本转交给所申请大学，由学校审阅使用"], ["如何使用", "成绩与写作答卷供 UCL/牛津在录取中综合参考；具体权重与门槛由各校自定"]]}}, "faq": [{"q": "TARA 和 TSA、BMAT 有什么区别？", "a": "TARA 是 2026 年入学起新启用的机考，定位与已停考的 TSA、BMAT 相近，都是通用学术推理测试。其批判性思维、问题解决两个客观模块承接 TSA Section 1 与 BMAT Section 1 的命题传统，写作模块类似 TSA 写作。主要变化是改由 UAT-UK/Pearson VUE 统一在考点上机进行，并整合替代了牛津的 TSA 与 UCL 的 STAT。"}, {"q": "哪些学校和专业需要考 TARA？", "a": "目前为 UCL 与牛津大学的部分本科课程。UCL 用于计算机科学相关课程（取代 STAT）；牛津用于经济管理、PPE、人文科学、历史与经济、历史与政治、实验心理学、PPL 等课程（取代 TSA）。并非所有专业都用 TARA，务必核对各校招生页面。"}, {"q": "考试由什么组成、多长时间？", "a": "三个必考模块：批判性思维（22 题选择）、问题解决（22 题选择）、写作任务（3 选 1，上限 750 词）。每个模块独立计时 40 分钟，总计约 120 分钟（不含休息），全程在 Pearson VUE 考点上机完成。"}, {"q": "没有真题的新考试该怎么备考？", "a": "官方建议先研读 TARA 大纲与题型指南，完成 Pearson VUE 提供的两套官方练习测试（格式与软件与正式考试一致）；想要更多练习，可使用 TSA Section 1（2008-2023）和 BMAT Section 1（2003-2023）的历年试题及答案作为补充。"}, {"q": "写作任务怎么评分？", "a": "写作任务不由 UAT-UK 打分，也不计入 1–9 分数。系统会将你的写作答卷副本发送给你申请的相关大学，由各校招生官在录取评审时自行参考。"}, {"q": "分数怎么算、怎么用于录取？", "a": "批判性思维和问题解决分别给出 1（低）到 9（高）的分数，精确到一位小数。各大学结合这些分数、写作答卷及其他申请材料综合评估，具体门槛与权重由学校自定。"}, {"q": "什么时候考、可以选场次吗？", "a": "每年两场：10 月（约 10 月 14 日）与次年 1 月（约 1 月 7 日）。牛津申请者必须参加 10 月场；仅申请 UCL 且未申请牛津者可自选 10 月或 1 月场。中国大陆、香港、澳门每个窗口仅提供一天考试。"}, {"q": "报名时间和费用是多少？", "a": "2026-27 周期账户创建自 2026 年 6 月 1 日开放；10 月场考位 7 月 20 日开放预订、9 月 28 日截止。费用为英国及爱尔兰考生 £78、其他地区考生 £133（以官方公布为准）。符合条件的英国考生可申请助学金减免。"}]}}, "COURSES": {"_intro": "航铂教育针对每个考试体系提供三档集中授课方案，从临考冲刺到系统提升，按需选择。下表为各档方案的逐节授课内容，可根据学员基础与目标分数定制调整。", "_plans_meta": [{"key": "sprint", "name": "考试冲刺精讲精练班", "l }
function renderRes(){
  const r=D.RES[curExam]||[];if(!r.length)return`<section class="card"><div class="muted">暂无</div></section>`;
  const specs=r.filter(x=>x.cat==="Specifications"),refs=r.filter(x=>x.cat!=="Specifications");
  const card=(title,arr)=>arr.length?`<section class="card"><h3>${title}</h3><div class="res">${arr.map(x=>`<a class="f" href="${enc(x.path)}" target="_blank"><span class="pill p-报告">${x.kind}</span><span class="nm">${esc(x.name)}</span><span class="sz">${sz(x.size)}</span></a>`).join("")}</div></section>`:"";
  return card("官方考纲",specs)+card("教材与参考资料",refs);
}
function renderPapers(){
  const g=D.PAPERS[curExam]||[];if(!g.length)return`<section class="card"><div class="muted">暂无</div></section>`;
  const intro=(D.INTRO||{})[curExam]||[];
  const introHtml=intro.length?`<section class="card"><h3>如何使用本页</h3><ul class="pintro">${intro.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></section>`:"";
  const note=(D.NOTES||{})[curExam];
  const noteHtml=note?`<div class="pnote">${esc(note)}</div>`:"";
  return introHtml+`<section class="card">${noteHtml}${g.map(grp=>`<div class="grp"><div class="gh"><span class="y">${esc(grp.header)}</span><span class="muted">· ${grp.files.length} 份</span></div><div class="files">${
    grp.files.map(f=>`<a class="f" href="${enc(f.path)}" target="_blank"><span class="pill p-${f.pill}">${f.pill}</span><span class="nm">${esc(f.name)}</span><span class="sz">${sz(f.size)}</span></a>`).join("")
  }</div></div>`).join("")}</section>`;
}
function render(){
  nav();subtabs();
  document.getElementById("content").innerHTML=
    curTab==="intro"?renderIntro():curTab==="course"?renderCourse():curTab==="res"?renderRes():renderPapers();
}
document.getElementById("content").addEventListener("click",e=>{
  const q=e.target.closest(".faq-q");if(q)q.closest(".faq-item").classList.toggle("open");
});
document.getElementById("tot").textContent=D.TOTAL;
render();
</script>
</body>
