*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
header{padding:28px 20px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(15,18,32,.92);backdrop-filter:blur(8px);z-index:10}

.sub{color:var(--mut);font-size:13px}

.chip.on{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:600}
.tnav{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
main{padding:18px 0 60px}
.exam{margin:26px 0 8px;font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.cnt{font-size:12px;color:var(--mut);font-weight:400}
.grp{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:10px 0;overflow:hidden}
.grp>summary{cursor:pointer;padding:11px 15px;font-weight:600;font-size:14px;list-style:none;display:flex;justify-content:space-between;align-items:center}
.grp>summary::-webkit-details-marker{display:none}
.grp>summary:hover{background:#202744}
.files{padding:4px 0 8px}
.f{display:flex;align-items:center;gap:10px;padding:8px 15px;border-top:1px solid var(--line);text-decoration:none;color:var(--ink);font-size:13px}
.f:hover{background:#202744}
.f .nm{flex:1}
.badge{font-size:11px;padding:2px 8px;border-radius:6px;white-space:nowrap}
.b-qp{background:#1e3a5f;color:#9cc4ff}
.b-ans{background:#3a2f10;color:#ffd98a}
.b-sol{background:#103a2a;color:#8af0c0}
.b-ms{background:#2a1040;color:#d9a6ff}
.b-er{background:#3a1020;color:#ff9eb5}
.b-wa{background:#103a3a;color:#8af0f0}
.b-spec{background:#2a2a2a;color:#cfcfcf}
.b-ref{background:#202744;color:#9aa6c8}
.sz{color:var(--mut);font-size:11px;min-width:54px;text-align:right}
.empty{color:var(--mut);text-align:center;padding:50px}
footer{color:var(--mut);font-size:12px;text-align:center;padding:24px;border-top:1px solid var(--line)}
a.src{color:var(--acc)}
</style>

const EXAMS=["STEP","TMUA","ESAT","TARA"];
const TYPES=["Question Paper","Answer Key","Worked Answers","Solutions","Mark Scheme","Examiner Report","Specification","Reference"];
const BCLS={"Question Paper":"b-qp","Answer Key":"b-ans","Worked Answers":"b-wa","Solutions":"b-sol","Mark Scheme":"b-ms","Examiner Report":"b-er","Specification":"b-spec","Reference":"b-ref"};
let curExam="ALL", curType="ALL", q="";

function enc(p){return p.split("/").map(encodeURIComponent).join("/");}
function fmtSize(b){return b>1048576?(b/1048576).toFixed(1)+" MB":Math.round(b/1024)+" KB";}

function build(){
  const nav=document.getElementById("examNav");
  nav.innerHTML="";
  [["ALL","全部"]].concat(EXAMS.map(e=>[e,e])).forEach(([v,t])=>{
    const c=document.createElement("span");c.className="chip"+(curExam===v?" on":"");c.textContent=t+(v==="ALL"?" ("+DATA.length+")":" ("+DATA.filter(d=>d.exam===v).length+")");
    c.onclick=()=>{curExam=v;render();build();};nav.appendChild(c);
  });
  const tn=document.getElementById("typeNav");tn.innerHTML="";
  [["ALL","所有类型"]].concat(TYPES.map(t=>[t,t])).forEach(([v,t])=>{
    const c=document.createElement("span");c.className="chip"+(curType===v?" on":"");c.textContent=t;
    c.onclick=()=>{curType=v;render();build();};tn.appendChild(c);
  });
}

function render(){
  const ql=q.trim().toLowerCase();
  let rows=DATA.filter(d=>(curExam==="ALL"||d.exam===curExam)&&(curType==="ALL"||d.type===curType)&&(!ql||d.name.toLowerCase().includes(ql)||(d.year||"").includes(ql)||d.exam.toLowerCase().includes(ql)));
  document.getElementById("stat").textContent="STEP 182 · TARA 94 · ESAT 75 · TMUA 48　|　当前显示 "+rows.length+" 份";
  document.getElementById("tot").textContent=DATA.length;
  const list=document.getElementById("list");list.innerHTML="";
  if(!rows.length){list.innerHTML='<div class="empty">没有匹配的文件</div>';return;}
  EXAMS.forEach(ex=>{
    const er=rows.filter(d=>d.exam===ex);if(!er.length)return;
    const h=document.createElement("div");h.className="exam";h.innerHTML=ex+' <span class="cnt">'+er.length+' 份</span>';list.appendChild(h);
    // group by category then sub/group
    const order=["Papers","Specifications","References"];
    const keys=[];const map={};
    er.forEach(d=>{
      let k = d.category==="Papers" ? (d.sub?d.sub+" · ":"")+d.group : d.category;
      if(!map[k]){map[k]=[];keys.push(k);}map[k].push(d);
    });
    keys.sort((a,b)=>{ // papers by sub/year desc-ish, keep simple alpha but Specifications/References last
      const rank=s=>s==="Specifications"?1:s==="References"?2:0;
      if(rank(a)!==rank(b))return rank(a)-rank(b);
      return b.localeCompare(a,'en',{numeric:true});
    });
    const openByDefault = (ql||curType!=="ALL"||curExam!=="ALL");
    keys.forEach(k=>{
      const det=document.createElement("details");det.className="grp";if(openByDefault)det.open=true;
      const arr=map[k];
      det.innerHTML='<summary><span>'+k+'</span><span class="cnt">'+arr.length+'</span></summary>';
      const fd=document.createElement("div");fd.className="files";
      arr.sort((a,b)=>a.name.localeCompare(b.name,'en',{numeric:true}));
      arr.forEach(d=>{
        const a=document.createElement("a");a.className="f";a.href=enc(d.path);a.target="_blank";
        a.innerHTML='<span class="badge '+(BCLS[d.type]||'b-ref')+'">'+d.type+'</span><span class="nm">'+d.name.replace(/\.pdf$/i,'')+'</span><span class="sz">'+fmtSize(d.size)+'</span>';
        fd.appendChild(a);
      });
      det.appendChild(fd);list.appendChild(det);
    });
  });
}
document.getElementById("q").addEventListener("input",e=>{q=e.target.value;render();});
build();render();
</script>
